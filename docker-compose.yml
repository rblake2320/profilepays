version: '3.9'

services:
  # ─── PostgreSQL (production database) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: profilepays_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-profilepays_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-profilepays_password}
      POSTGRES_DB: ${DB_DATABASE:-profilepays_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-profilepays_user} -d ${DB_DATABASE:-profilepays_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profilepays_net

  # ─── Redis (session / queue cache) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: profilepays_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profilepays_net

  # ─── NestJS Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      # Root context: the npm-workspace lockfile lives at the repository root
      context: .
      dockerfile: backend/Dockerfile
    container_name: profilepays_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-profilepays_user}
      DB_PASSWORD: ${DB_PASSWORD:-profilepays_password}
      DB_NAME: ${DB_DATABASE:-profilepays_db}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_jwt_secret_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_in_production_refresh_secret_min_32_chars}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/v1/campaigns').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - profilepays_net

  # ─── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      # Root context: the npm-workspace lockfile lives at the repository root
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Same-origin path — nginx proxies /api/ to the backend service
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: profilepays_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - profilepays_net

volumes:
  postgres_data:
    driver: local

networks:
  profilepays_net:
    driver: bridge
